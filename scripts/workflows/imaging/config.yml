# HPC-specific paths (not included in public repo)
# fmriprep_dir: "/path/to/fmriprep/"
# bids_dir: "/path/to/bids/"
# in_dir: "/path/to/data/"


pybids_inputs:
  bold:
    filters:
      task: "LST"
      suffix: "bold"
      extension: "dtseries.nii"
      space: "fsLR"
      datatype: "func"
    wildcards:
      - subject
      - run

out_data: "./processed_data/fmri/"  # relative to project root

denoise:
  - "14p"

model:
  - 144


